services:
  postgres:
    platform: linux/amd64
    image: postgres:16
    environment:
      POSTGRES_DB: password_exposure_analyzer
      POSTGRES_USER: pea
      POSTGRES_PASSWORD: pea_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pea -d password_exposure_analyzer"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    platform: linux/amd64
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgres://pea:pea_password@postgres:5432/password_exposure_analyzer
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000/api
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
